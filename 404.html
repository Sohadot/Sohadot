<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<meta name="theme-color" content="#0d224f"/>
<title>Page Not Found – Sohadot.com</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f6f2e9;--card:#fff;--border:rgba(15,23,42,0.08);--blue:#2454d3;--blue-2:#173b98;--text:#122033;--muted:#66758c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{max-width:520px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 36px;box-shadow:0 20px 50px rgba(15,23,42,0.08);}
.code{font-family:'Cormorant Garamond',serif;font-size:5rem;font-weight:800;color:var(--blue);line-height:1;margin-bottom:12px;}
h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:12px;}
p{color:var(--muted);font-size:.95rem;line-height:1.8;margin-bottom:26px;}
.links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
a.btn{display:inline-flex;align-items:center;min-height:46px;padding:0 20px;border-radius:14px;font-weight:600;font-size:.9rem;text-decoration:none;}
a.primary{background:linear-gradient(135deg,var(--blue),var(--blue-2));color:#fff;}
a.secondary{background:#f8f5ee;border:1px solid var(--border);color:var(--muted);}
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <h1>This page doesn't exist.</h1>
  <p>The page you're looking for may have moved or never existed. The tools below are the fastest way back into the platform.</p>
  <div class="links">
    <a class="btn primary" href="/">Home</a>
    <a class="btn secondary" href="/valuation.html">Valuation</a>
    <a class="btn secondary" href="/portfolio.html">Portfolio</a>
    <a class="btn secondary" href="/knowledge-base.html">Knowledge Base</a>
  </div>
</div>
</body>
</html>
