name: Update Valuation Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate valuation comps
        run: python scripts/generate_valuation_data.py

      - name: Commit updated valuation data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/valuation_comps.json
          git diff --cached --quiet || git commit -m "Auto-update valuation data"
          git push
